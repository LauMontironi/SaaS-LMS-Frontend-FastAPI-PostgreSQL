<div class="admin-page">

    <section class="admin-hero">
        <div>
            <p class="admin-eyebrow">Admin panel</p>
            <h1>LMS management dashboard</h1>
            <p>Manage courses, lessons and platform content from one place.</p>
        </div>
        <div class="admin-actions">
            <a routerLink="/admin/courses" class="admin-btn">Manage courses →</a>
        </div>
    </section>

    @if (isLoading()) {
    <p class="loading-text">Loading admin stats...</p>
    } @else if (stats(); as currentStats) {
    <app-admin-stats-cards [stats]="currentStats"></app-admin-stats-cards>
    }

</div>
