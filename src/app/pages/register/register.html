<div class="auth-page">

    <button type="button" class="back-btn" (click)="goBack()">
        ← Back
    </button>

    <div class="auth-container">

        <div class="auth-logo">
            <div class="auth-logo-icon">🎓</div>
        </div>

        <h1>Create account</h1>
        <p class="auth-subtitle">Start your learning journey today</p>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="form-field">
                <label for="first_name">First name</label>
                <input id="first_name" type="text" formControlName="first_name" placeholder="Laura" />
            </div>

            <div class="form-field">
                <label for="last_name">Last name</label>
                <input id="last_name" type="text" formControlName="last_name" placeholder="Montironi" />
            </div>

            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="••••••••" />
                    <button type="button" class="toggle-password" (click)="togglePassword()">
                        <i class="pi" [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn">Create account</button>

        </form>

        <p class="auth-footer">
            Already have an account? <a routerLink="/login">Sign in</a>
        </p>

    </div>

</div>
