<section class="dashboard-section">

    <div class="section-header">

        <h2>{{ title() }}</h2>

        @if(subtitle()){
        <span>{{ subtitle() }}</span>
        }

    </div>

    <div class="courses-grid">
        @for(course of courses(); track course.id; let i = $index){
        <app-course-card [course]="course" [style.animation-delay]="i * 60 + 'ms'">
        </app-course-card>
        }
    </div>

</section>
